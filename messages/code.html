<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md">
<!-- TopAppBar -->
<header class="bg-zinc-950/80 backdrop-blur-3xl border-b border-white/10 fixed top-0 z-50 flex justify-between items-center w-full px-6 h-16">
<button class="text-zinc-400 hover:bg-white/5 transition-all active:scale-95 p-2 rounded-full">

</button>
<h1 class="font-['Epilogue'] tracking-tight font-semibold text-white text-lg">Compose</h1>
<button class="text-zinc-400 hover:bg-white/5 transition-all active:scale-95 p-2 rounded-full">

</button>
</header>
<!-- Main Content -->
<main class="flex-grow pt-24 pb-32 px-container-margin max-w-4xl mx-auto w-full">
<form class="space-y-gutter">
<!-- Recipient Field -->
<div class="glass-panel p-4 rounded-lg flex items-center gap-sm">
<span class="text-outline font-label-md min-w-[60px]">To:</span>
<div class="flex items-center bg-white/10 rounded-full pl-1 pr-4 py-1 gap-2">
<img alt="Julian Thorne" class="w-8 h-8 rounded-full object-cover" data-alt="Close-up portrait of a stylish man with a short beard and creative eyewear in a modern design studio setting with soft moody lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgWa02OTR30yvsvJrOtNMwOpYmy6eRdvA2vlW1Nr9cFF55ViE15aIqxd54gTCcKh062yKYD1vlsp9M1Mi8_UYdLlASgCmwJSjRPMK8u5ZDCffpLNJVb1mKnh-QNYEOFzWisGU2xSX1T7tPbdppvxn4G9R2MMJooe-6Y25SKT4eu15BHc_K6SzOibL6qlNRSSM2adVnX3GtVM0s3jt8ZviXLsVkm-kXi5Ai9syMeDBxlx-KEUsJZZgzr_Xf2-pPDstEWwpNDHm6aP4"/>
<span class="text-white font-label-md">Julian Thorne</span>
<span class="material-symbols-outlined text-[16px] text-zinc-500 cursor-pointer">close</span>
</div>
<div class="flex-grow"></div>
<span class="material-symbols-outlined text-zinc-500">add_circle</span>
</div>
<!-- Subject Field -->
<div class="glass-panel p-4 rounded-lg flex items-center gap-sm focus-within:ring-2 focus-within:ring-primary-container/50 transition-all">
<span class="text-outline font-label-md min-w-[60px]">Subject:</span>
<input class="bg-transparent border-none focus:ring-0 text-white w-full placeholder:text-zinc-600 font-body-md" placeholder="Subject" type="text"/>
</div>
<!-- Message Body -->
<div class="glass-panel p-6 rounded-lg min-h-[400px] flex flex-col focus-within:ring-2 focus-within:ring-primary-container/50 transition-all">
<textarea class="bg-transparent border-none focus:ring-0 text-white w-full flex-grow placeholder:text-zinc-600 font-body-lg resize-none" placeholder="Type your message here..."></textarea>
<!-- Composition Tools -->
<div class="mt-md pt-md border-t border-white/5 flex items-center justify-between">
<div class="flex gap-4">
<button class="text-zinc-500 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">format_bold</span>
</button>
<button class="text-zinc-500 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">attach_file</span>
</button>
<button class="text-zinc-500 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">image</span>
</button>
<button class="text-zinc-500 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">sentiment_satisfied</span>
</button>
</div>
<div class="text-zinc-600 text-[12px] font-medium uppercase tracking-widest">
                        Draft saved
                    </div>
</div>
</div>

<div class="flex justify-end pt-base">
<button class="bg-primary-container text-on-primary-container font-headline-md px-12 py-4 rounded-full glow-button flex items-center gap-3 hover:bg-primary transition-all active:scale-95 group">
<span>Send</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">send</span>
</button>
</div>
</form>
</main>
